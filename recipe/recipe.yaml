schema_version: 1

context:
  name: gpcam
  version: "8.3.7"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/gpcam-${{ version }}.tar.gz
  sha256: e5e35ff582c14035529fa13b3fbfdde0d79b4a66c3c9f35058d4441ddfb7cb47

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python 3.11.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - numpy <2.3.0,>=2.2.6
    - scipy <1.17.0,>=1.16.0
    - dask-core >=2025.5.1,<2025.6.dev0
    - distributed >=2025.5.1,<2025.6.dev0
    - fvgp >=4.7.8,<7
    - loguru

tests:
  - python:
      imports:
        - gpcam
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: gpCAM is a code for autonomous data acquisition
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://gpcam.lbl.gov

extra:
  recipe-maintainers:
    - jan-janssen
